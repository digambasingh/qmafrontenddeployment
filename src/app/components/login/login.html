<div class="auth-page" id="login-page">
  <div class="auth-container">

    <!-- Left: Branding -->
    <div class="auth-branding">
      <div class="branding-content">
        <span class="branding-icon">📐</span>
        <h1 class="branding-title">Quanment</h1>
        <p class="branding-subtitle">Your go-to unit converter for length, temperature & volume</p>
        <div class="branding-features">
          <div class="feature-item">
            <span class="feature-dot"></span>
            <span>Instant conversions</span>
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            <span>Conversion history</span>
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            <span>Multiple unit types</span>
          </div>
        </div>
      </div>
      <div class="branding-decoration"></div>
      <div class="branding-decoration secondary"></div>
    </div>

    <!-- Right: Form -->
    <div class="auth-form-section">
      <div class="auth-form-wrapper">
        <h2 class="form-title">Welcome back</h2>
        <p class="form-subtitle">Sign in to your account to continue</p>

        @if (errorMessage()) {
          <div class="error-banner" id="login-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()" class="auth-form" id="login-form">
          <div class="form-group">
            <label for="login-email" class="form-label">Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <input
                type="email"
                id="login-email"
                class="form-input"
                placeholder="you@example.com"
                [(ngModel)]="email"
                name="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="login-password" class="form-label">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input
                type="password"
                id="login-password"
                class="form-input"
                placeholder="Enter your password"
                [(ngModel)]="password"
                name="password"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="auth-btn"
            id="login-submit"
            [disabled]="isLoading()"
          >
            @if (isLoading()) {
              <span class="spinner"></span>
              Signing in...
            } @else {
              Sign In
            }
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider" id="login-divider">
          <span class="divider-line"></span>
          <span class="divider-text">or</span>
          <span class="divider-line"></span>
        </div>

        <!-- Google Sign-In -->
        <div class="google-btn-container" id="google-signin-btn-login"></div>

        <p class="auth-switch">
          Don't have an account?
          <a routerLink="/signup" class="auth-link" id="goto-signup">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
