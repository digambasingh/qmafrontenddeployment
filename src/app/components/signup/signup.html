<div class="auth-page" id="signup-page">
  <div class="auth-container">

    <!-- Left: Branding -->
    <div class="auth-branding">
      <div class="branding-content">
        <span class="branding-icon">📐</span>
        <h1 class="branding-title">Quanment</h1>
        <p class="branding-subtitle">Join thousands of users converting units effortlessly every day</p>
        <div class="branding-features">
          <div class="feature-item">
            <span class="feature-dot"></span>
            <span>Free to use, forever</span>
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            <span>Save conversion history</span>
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            <span>Access from any device</span>
          </div>
        </div>
      </div>
      <div class="branding-decoration"></div>
      <div class="branding-decoration secondary"></div>
    </div>

    <!-- Right: Form -->
    <div class="auth-form-section">
      <div class="auth-form-wrapper">
        <h2 class="form-title">Create account</h2>
        <p class="form-subtitle">Get started with your free account</p>

        @if (errorMessage()) {
          <div class="error-banner" id="signup-error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
              <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <form (ngSubmit)="onSubmit()" class="auth-form" id="signup-form">

          <!-- First Name & Last Name side by side -->
          <div class="form-row">
            <div class="form-group">
              <label for="signup-firstname" class="form-label">First Name</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                </svg>
                <input
                  type="text"
                  id="signup-firstname"
                  class="form-input"
                  placeholder="John"
                  [(ngModel)]="firstName"
                  name="firstName"
                  required
                />
              </div>
            </div>

            <div class="form-group">
              <label for="signup-lastname" class="form-label">Last Name</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                </svg>
                <input
                  type="text"
                  id="signup-lastname"
                  class="form-input"
                  placeholder="Doe"
                  [(ngModel)]="lastName"
                  name="lastName"
                  required
                />
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="signup-email" class="form-label">Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="22,6 12,13 2,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <input
                type="email"
                id="signup-email"
                class="form-input"
                placeholder="you@example.com"
                [(ngModel)]="email"
                name="email"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="signup-password" class="form-label">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input
                type="password"
                id="signup-password"
                class="form-input"
                placeholder="Min. 6 characters"
                [(ngModel)]="password"
                name="password"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="signup-confirm" class="form-label">Confirm Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <input
                type="password"
                id="signup-confirm"
                class="form-input"
                placeholder="Re-enter your password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
                required
              />
            </div>
          </div>

          <button
            type="submit"
            class="auth-btn"
            id="signup-submit"
            [disabled]="isLoading()"
          >
            @if (isLoading()) {
              <span class="spinner"></span>
              Creating account...
            } @else {
              Create Account
            }
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider" id="signup-divider">
          <span class="divider-line"></span>
          <span class="divider-text">or</span>
          <span class="divider-line"></span>
        </div>

        <!-- Google Sign-In -->
        <div class="google-btn-container" id="google-signin-btn-signup"></div>

        <p class="auth-switch">
          Already have an account?
          <a routerLink="/login" class="auth-link" id="goto-login">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
